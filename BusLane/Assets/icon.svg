<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="512" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Abstract Flow / Data Lanes -->
  
  <!-- Lane 1: Static/Infrastructure (Darker) -->
  <rect x="96" y="152" width="128" height="56" rx="28" fill="#27272a"/>
  <rect x="248" y="152" width="168" height="56" rx="28" fill="#27272a"/>

  <!-- Lane 2: Active/Bus (Vibrant) -->
  <rect x="96" y="228" width="320" height="56" rx="28" fill="url(#accent)"/>

  <!-- Lane 3: Static/Infrastructure (Darker) -->
  <rect x="96" y="304" width="200" height="56" rx="28" fill="#27272a"/>
  
  <!-- Small dot accent -->
  <circle cx="344" cy="332" r="28" fill="#27272a"/>

</svg>
